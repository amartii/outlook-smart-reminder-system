<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Outlook Smart Reminder — Accenture{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="ac-navbar">
    <a class="navbar-brand" href="/">
        <span class="ac-logo-chevron">></span>
        <span class="ac-brand-name">Accenture</span>
        <span class="ac-brand-sep">|</span>
        <span class="ac-brand-sub">Outlook Smart Reminder</span>
    </a>
    <div class="ac-nav-links">
        <a href="/dashboard"  class="ac-nav-link {% block nav_dashboard %}{% endblock %}">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>
        <a href="/categories" class="ac-nav-link {% block nav_categories %}{% endblock %}">
            <i class="bi bi-tags"></i> Categorías
        </a>
        <a href="/setup"      class="ac-nav-link {% block nav_setup %}{% endblock %}">
            <i class="bi bi-gear"></i> Configuración
        </a>
    </div>
</nav>

<div class="ac-container">
    <div id="alertContainer" class="mb-3"></div>
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
